<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Stephen Chow Skill</title>
  <desc id="desc">Wulitou comedy engine banner with cinema-inspired geometric shapes</desc>
