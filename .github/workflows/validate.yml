name: Validate skill

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate source registry
        run: python scripts/source_validator.py references/source-registry.json
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Check skill structure
        run: python tests/validate_skill.py
